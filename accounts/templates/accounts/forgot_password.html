<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #4facfe;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            height: 50px;
            padding-left: 50px;
        }

        .form-control:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #4facfe;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #4facfe;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00c6fb);
            border: none;
            color: white;
            font-weight: bold;
            height: 50px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00c6fb, #4facfe);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .alert {
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }

        .field-container {
            position: relative;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Forgot Password</h2>
        {% if messages %}
            <div class="alert alert-danger">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field-container">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
            </div>
            <div class="field-container">
                <i class="bi bi-person input-icon"></i>
                <input type="text" class="form-control" name="new_username" placeholder="Enter new username" required>
            </div>
            <div class="field-container">
                <i class="bi bi-lock input-icon"></i>
                <i class="bi bi-eye toggle-password" onclick="togglePassword(this, 'new_password')"></i>
                <input type="password" id="new_password" class="form-control" name="new_password" placeholder="Enter new password" required>
            </div>
            <div class="field-container">
                <i class="bi bi-lock input-icon"></i>
                <i class="bi bi-eye toggle-password" onclick="togglePassword(this, 'confirm_password')"></i>
                <input type="password" id="confirm_password" class="form-control" name="confirm_password" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
        </form>
    </div>

    <script>
        function togglePassword(element, fieldId) {
            const input = document.getElementById(fieldId);
            if (input.type === "password") {
                input.type = "text";
                element.classList.remove("bi-eye");
                element.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                element.classList.remove("bi-eye-slash");
                element.classList.add("bi-eye");
            }
        }
    </script>
</body>
</html>
